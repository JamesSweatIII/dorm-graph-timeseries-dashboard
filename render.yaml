# Dorm-Graph-Timeseries-Dashboard — Streamlit Q&A agent over a Neo4j dormitory knowledge graph
services:
  - type: web
    name: dorm-graph-qa
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run main/app.py --server.port $PORT --server.headless true
    envVars:
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
      - key: LLM_BASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: qwen/qwen-2.5-72b-instruct
